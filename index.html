<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS Admin Hub | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen overflow-x-hidden">

    <div id="login-page" class="fixed inset-0 bg-black flex items-center justify-center z-[100] p-4 transition-opacity duration-500">
        <div class="glass-panel p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/10 text-center">
            <h1 class="text-3xl font-black text-white mb-8 italic tracking-tighter uppercase">CTS <span class="text-blue-500">Admin Hub</span></h1>
            <input type="password" id="admin-pass" placeholder="Enter Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none mb-4 text-center text-xl focus:border-blue-500 transition-all">
            <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/20 transition-all uppercase tracking-widest">Access System</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col md:flex-row min-h-screen">
        
        <aside class="w-full md:w-72 bg-[#020617] border-r border-white/5 p-8 flex flex-col gap-8 sticky top-0 h-screen z-50">
            <div class="px-4"><h2 class="text-3xl font-black text-white italic tracking-tighter">CTS<span class="text-blue-500">.</span></h2></div>
            <nav class="flex flex-col gap-2 flex-1">
                <button onclick="switchTab('roster', this)" class="nav-link active-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>🏠</span> Dashboard</button>
                <button onclick="switchTab('attendance', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📅</span> Attendance</button>
                <button onclick="switchTab('homework', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📚</span> Homework</button>
                <button onclick="switchTab('database', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📂</span> Database</button>
                <button onclick="switchTab('settings', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>⚙️</span> Settings</button>
            </nav>
            <button onclick="logout()" class="p-4 text-rose-500 font-bold text-xs uppercase tracking-widest hover:bg-rose-500/10 rounded-2xl transition-all">Logout Session</button>
        </aside>

        <main class="flex-1 p-6 md:p-12 bg-gradient-to-br from-[#020617] to-[#0f172a]">
            
            <section id="tab-roster" class="tab-content active-tab">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
                    <div>
                        <h1 class="text-6xl font-black text-white italic tracking-tighter mb-2 uppercase">Roster</h1>
                        <p class="text-slate-500 font-bold uppercase text-[10px] tracking-[0.3em]">Total Active Students: <span id="stat-total-students" class="text-blue-400">0</span></p>
                    </div>
                    <button onclick="openStudentModal()" class="bg-blue-600 text-white px-10 py-5 rounded-[1.5rem] font-bold text-xs uppercase shadow-xl shadow-blue-600/20 hover:scale-105 active:scale-95 transition-all">Add New Student</button>
                </div>
                <div class="mb-8"><input type="text" id="roster-search" oninput="renderStudentTable()" placeholder="Search names or barcodes..." class="w-full max-w-md bg-white/5 border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500 shadow-inner"></div>
                <div class="glass-panel rounded-[2.5rem] overflow-hidden border border-white/5">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                <th class="p-8">Student Identity</th><th class="p-8">Grade Level</th><th class="p-8 text-center">Attendance</th><th class="p-8 text-center">HW Average</th><th class="p-8 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-attendance" class="tab-content">
                <h1 class="text-5xl font-black text-white italic mb-12 uppercase tracking-tighter">Attendance Scans</h1>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="glass-panel p-1 rounded-[3rem] border-2 border-emerald-500/20 shadow-[0_0_50px_-12px_rgba(16,185,129,0.2)]">
                            <input type="text" id="attendance-scan-input" placeholder="Ready for Barcode..." class="w-full bg-transparent p-12 rounded-[3rem] text-4xl text-white outline-none font-mono text-center placeholder:text-slate-700">
                        </div>
                        <div class="flex items-center justify-center gap-4 py-4">
                            <span class="w-3 h-3 bg-emerald-500 rounded-full animate-ping"></span>
                            <p class="text-emerald-500 font-black uppercase text-xs tracking-widest">Scanner Active</p>
                        </div>
                    </div>
                    <div class="glass-panel p-8 rounded-[2.5rem] border border-white/5 h-[600px] flex flex-col">
                        <h3 class="text-white font-bold uppercase text-[10px] tracking-widest mb-6 text-slate-500">Live Scan Logs</h3>
                        <textarea id="session-log" readonly class="flex-1 bg-black/40 border border-white/5 rounded-3xl p-6 font-mono text-xs text-emerald-400 outline-none resize-none leading-relaxed"></textarea>
                    </div>
                </div>
            </section>

            <section id="tab-homework" class="tab-content">
                <h1 class="text-5xl font-black text-white italic mb-12 uppercase tracking-tighter">Homework Portal</h1>
                <div id="hw-grade-container" class="space-y-8"></div>
            </section>

            <section id="tab-database" class="tab-content">
                <div class="flex justify-between items-center mb-12">
                    <h1 class="text-5xl font-black text-white italic uppercase tracking-tighter">Database</h1>
                    <label class="bg-blue-600/10 text-blue-400 px-8 py-4 rounded-2xl font-bold text-xs uppercase cursor-pointer border border-blue-400/20 hover:bg-blue-600 hover:text-white transition-all">
                        Import CSV <input type="file" id="csv-file-input" class="hidden" accept=".csv">
                    </label>
                </div>
                <div class="mb-8"><input type="text" id="db-search" oninput="renderDatabaseTable()" placeholder="Search Parents or Contacts..." class="w-full max-w-md bg-white/5 border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500"></div>
                <div class="glass-panel rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                <th class="p-8">Name & ID</th><th class="p-8">Grade</th><th class="p-8">Phone Contact</th><th class="p-8">Parent Emails</th><th class="p-8 text-right">Delete</th>
                            </tr>
                        </thead>
                        <tbody id="database-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-settings" class="tab-content">
                <div class="max-w-4xl mx-auto space-y-10">
                    <div class="glass-panel p-12 rounded-[3rem] border border-white/5 text-center">
                        <h3 class="text-slate-500 font-bold mb-6 uppercase text-xs tracking-widest">Total Course Sessions Held</h3>
                        <input type="number" id="global-classes-input" onchange="updateGlobalClasses(this.value)" class="w-48 bg-black/40 border-2 border-white/5 p-8 rounded-[2.5rem] text-7xl font-black text-blue-500 outline-none text-center focus:border-blue-500 transition-all">
                    </div>
                    <div id="grade-config-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                    <button onclick="addNewGrade()" class="w-full bg-white/5 p-6 rounded-3xl border border-dashed border-white/10 font-bold text-xs uppercase tracking-[0.2em] text-slate-400 hover:bg-white/10 transition-all">+ Add New Grade Level</button>
                </div>
            </section>
        </main>
    </div>

    <div id="student-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden items-center justify-center z-[110] p-4">
        <div class="glass-panel p-12 rounded-[3rem] border border-white/10 w-full max-w-xl shadow-2xl">
            <h2 class="text-3xl font-black text-white mb-10 italic uppercase tracking-tighter">Student Profile</h2>
            <div class="grid grid-cols-1 gap-5">
                <input type="text" id="m-id" placeholder="Barcode ID" class="modal-input">
                <input type="text" id="m-name" placeholder="Student Full Name" class="modal-input">
                <input type="text" id="m-grade" placeholder="Grade ID (e.g., g1)" class="modal-input">
                <input type="text" id="m-phone" placeholder="Parent Phone Number" class="modal-input">
                <div class="grid grid-cols-2 gap-4">
                    <input type="email" id="m-f-email" placeholder="Father Email" class="modal-input">
                    <input type="email" id="m-m-email" placeholder="Mother Email" class="modal-input">
                </div>
            </div>
            <div class="flex gap-4 mt-12">
                <button onclick="closeStudentModal()" class="flex-1 bg-white/5 text-slate-400 py-5 rounded-2xl font-bold uppercase text-xs tracking-widest hover:bg-white/10">Discard</button>
                <button onclick="saveStudent()" class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-bold hover:bg-blue-500 transition-all uppercase text-xs tracking-widest">Save Record</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
