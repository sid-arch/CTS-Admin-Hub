<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS Admin Hub | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen selection:bg-blue-500/30">

    <div id="login-page" class="fixed inset-0 bg-black flex items-center justify-center z-[110] p-4">
        <div class="glass-panel p-12 rounded-[3rem] shadow-2xl w-full max-w-md border border-white/10 text-center">
            <h1 class="text-4xl font-black text-white mb-10 italic tracking-tighter uppercase">CTS <span class="text-blue-500">Hub</span></h1>
            <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-white outline-none mb-6 text-center text-2xl focus:border-blue-500 transition-all">
            <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl shadow-lg shadow-blue-500/20 transition-all uppercase tracking-[0.2em]">Unlock System</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col md:flex-row min-h-screen">
        
        <aside class="w-full md:w-80 bg-[#020617] border-r border-white/5 p-10 flex flex-col gap-10 sticky top-0 h-screen">
            <div class="px-2"><h2 class="text-4xl font-black text-white italic tracking-tighter">CTS<span class="text-blue-500">.</span></h2></div>
            <nav class="flex flex-col gap-3 flex-1">
                <button onclick="switchTab('roster', this)" class="nav-link active-link p-5 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>🏠</span> Dashboard</button>
                <button onclick="switchTab('attendance', this)" class="nav-link p-5 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📅</span> Attendance</button>
                <button onclick="switchTab('homework', this)" class="nav-link p-5 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📚</span> Homework</button>
                <button onclick="switchTab('database', this)" class="nav-link p-5 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📂</span> Database</button>
                <button onclick="switchTab('settings', this)" class="nav-link p-5 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>⚙️</span> Settings</button>
            </nav>
            <button onclick="logout()" class="p-5 text-rose-500 font-black text-xs uppercase tracking-widest hover:bg-rose-500/10 rounded-2xl transition-all">Terminate Session</button>
        </aside>

        <main class="flex-1 p-6 md:p-16 bg-gradient-to-br from-[#020617] to-[#0f172a]">
            
            <section id="tab-roster" class="tab-content active-tab">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-8">
                    <div>
                        <h1 class="text-7xl font-black text-white italic tracking-tighter mb-4 uppercase">Roster</h1>
                        <p class="text-slate-500 font-bold uppercase text-[10px] tracking-[0.4em]">Live Database: <span id="stat-total-students" class="text-blue-400">0</span> Students</p>
                    </div>
                    <button onclick="openStudentModal()" class="bg-blue-600 text-white px-12 py-6 rounded-[2rem] font-black text-xs uppercase shadow-2xl shadow-blue-600/30 hover:scale-105 active:scale-95 transition-all">Add Student</button>
                </div>
                <div class="mb-10"><input type="text" id="roster-search" oninput="renderStudentTable()" placeholder="Filter Roster..." class="w-full max-w-md bg-white/5 border border-white/10 p-6 rounded-[1.5rem] text-white outline-none focus:border-blue-500"></div>
                <div class="glass-panel rounded-[3rem] overflow-hidden border border-white/5">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                <th class="p-10">Identity</th><th class="p-10">Grade</th><th class="p-10 text-center">Attendance</th><th class="p-10 text-center">HW Score</th><th class="p-10 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-attendance" class="tab-content">
                <h1 class="text-5xl font-black text-white italic mb-16 uppercase tracking-tighter">Attendance Terminal</h1>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="lg:col-span-2">
                        <div class="glass-panel p-2 rounded-[4rem] border-2 border-emerald-500/10 shadow-[0_0_60px_-15px_rgba(16,185,129,0.1)]">
                            <input type="text" id="attendance-scan-input" placeholder="Scan Barcode Now" class="w-full bg-transparent p-16 rounded-[4rem] text-5xl text-white outline-none font-mono text-center placeholder:text-slate-800">
                        </div>
                    </div>
                    <div class="glass-panel p-10 rounded-[3rem] border border-white/5 h-[600px] flex flex-col">
                        <h3 class="text-slate-500 font-black uppercase text-[10px] tracking-widest mb-8">Live Feed</h3>
                        <textarea id="session-log" readonly class="flex-1 bg-black/40 border border-white/5 rounded-[2rem] p-8 font-mono text-xs text-emerald-400 outline-none resize-none leading-relaxed"></textarea>
                    </div>
                </div>
            </section>

            <section id="tab-homework" class="tab-content">
                <h1 class="text-5xl font-black text-white italic mb-16 uppercase tracking-tighter">Homework Hub</h1>
                <div id="hw-grade-container" class="space-y-10"></div>
            </section>

            <section id="tab-database" class="tab-content">
                <div class="flex justify-between items-center mb-16">
                    <h1 class="text-5xl font-black text-white italic uppercase tracking-tighter">Directory</h1>
                    <label class="bg-blue-600/10 text-blue-400 px-10 py-5 rounded-2xl font-black text-xs uppercase cursor-pointer border border-blue-400/20 hover:bg-blue-600 hover:text-white transition-all">
                        Bulk Import CSV <input type="file" id="csv-file-input" class="hidden" accept=".csv">
                    </label>
                </div>
                <div class="glass-panel rounded-[3rem] overflow-hidden border border-white/5 shadow-2xl">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                <th class="p-10">Name</th><th class="p-10">Grade</th><th class="p-10">Contact</th><th class="p-10">Emails</th><th class="p-10 text-right">Records</th>
                            </tr>
                        </thead>
                        <tbody id="database-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-settings" class="tab-content">
                <div class="max-w-4xl mx-auto space-y-12">
                    <div class="glass-panel p-16 rounded-[4rem] border border-white/5 text-center">
                        <h3 class="text-slate-500 font-bold mb-8 uppercase text-xs tracking-[0.3em]">Total Sessions Held</h3>
                        <input type="number" id="global-classes-input" onchange="updateGlobalClasses(this.value)" class="w-56 bg-black/40 border-2 border-white/5 p-10 rounded-[3rem] text-8xl font-black text-blue-500 outline-none text-center focus:border-blue-500">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="grade-config-list"></div>
                    
                    <button onclick="addNewGrade()" class="w-full bg-white/5 p-8 rounded-[2rem] border-2 border-dashed border-white/5 font-black text-xs uppercase tracking-widest text-slate-500 hover:bg-white/10 transition-all">+ Register New Grade</button>

                    <div class="glass-panel p-12 rounded-[3rem] border border-white/5 flex flex-col md:flex-row gap-6 mt-10">
                        <button onclick="downloadFullBackup()" class="flex-1 bg-emerald-600/10 text-emerald-400 p-6 rounded-2xl font-black text-xs uppercase tracking-widest border border-emerald-500/20 hover:bg-emerald-600 hover:text-white transition-all">Download Full Cloud Backup</button>
                        <button onclick="dangerZoneReset()" class="flex-1 bg-rose-600/10 text-rose-500 p-6 rounded-2xl font-black text-xs uppercase tracking-widest border border-rose-500/20 hover:bg-rose-600 hover:text-white transition-all">Master Database Reset</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="student-modal" class="fixed inset-0 bg-black/95 backdrop-blur-2xl hidden items-center justify-center z-[120] p-4">
        <div class="glass-panel p-16 rounded-[4rem] border border-white/10 w-full max-w-2xl shadow-2xl">
            <h2 class="text-4xl font-black text-white mb-12 italic uppercase tracking-tighter">Student Profile</h2>
            <div class="grid grid-cols-1 gap-6">
                <input type="text" id="m-id" placeholder="Barcode ID" class="modal-input">
                <input type="text" id="m-name" placeholder="Full Name" class="modal-input">
                <input type="text" id="m-grade" placeholder="Grade ID" class="modal-input">
                <input type="text" id="m-phone" placeholder="Phone" class="modal-input">
                <div class="grid grid-cols-2 gap-6">
                    <input type="email" id="m-f-email" placeholder="Father Email" class="modal-input">
                    <input type="email" id="m-m-email" placeholder="Mother Email" class="modal-input">
                </div>
            </div>
            <div class="flex gap-6 mt-16">
                <button onclick="closeStudentModal()" class="flex-1 bg-white/5 text-slate-500 py-6 rounded-3xl font-black uppercase text-xs">Cancel</button>
                <button onclick="saveStudent()" class="flex-1 bg-blue-600 text-white py-6 rounded-3xl font-black hover:bg-blue-500 transition-all uppercase text-xs">Save Student</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
