<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS Admin Hub | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen">

    <div id="login-page" class="fixed inset-0 bg-[#000000] flex items-center justify-center z-[100] p-4">
        <div class="glass-panel p-10 rounded-3xl shadow-2xl w-full max-w-md border border-white/10 text-center">
            <h1 class="text-3xl font-extrabold text-white mb-8 italic tracking-tighter">CTS <span class="text-blue-500">ADMIN HUB</span></h1>
            <input type="password" id="admin-pass" placeholder="Enter Admin Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all mb-4 text-center">
            <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-500/20">ACCESS HUB</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-72 bg-[#020617] border-r border-white/5 p-8 flex flex-col gap-8">
            <div class="px-4"><h2 class="text-xl font-black text-white italic">CTS <span class="text-blue-500">HUB</span></h2></div>
            <nav class="flex flex-col gap-2">
                <button onclick="switchTab('roster', this)" class="nav-link active-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm">Dashboard</button>
                <button onclick="switchTab('attendance', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm">Attendance</button>
                <button onclick="switchTab('homework', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm">Homework</button>
                <button onclick="switchTab('database', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm">Database</button>
                <button onclick="switchTab('settings', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm">Settings</button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-12 overflow-y-auto">
            
            <section id="tab-roster" class="tab-content active-tab">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                    <div>
                        <h1 class="text-4xl font-black text-white italic mb-2">STUDENT <span class="text-blue-500">ROSTER</span></h1>
                        <p class="text-slate-500 text-sm font-medium">Total Registered: <span id="stat-total-students" class="text-white">0</span></p>
                    </div>
                    <div class="flex gap-3">
                        <label class="levitate bg-white/5 text-white px-8 py-4 rounded-2xl font-bold text-xs uppercase cursor-pointer border border-white/5 hover:bg-white/10">
                            Import CSV <input type="file" class="hidden" onchange="handleCSVImport(event)" accept=".csv">
                        </label>
                        <button onclick="openStudentModal()" class="levitate bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold text-xs uppercase shadow-lg shadow-blue-600/20">Add Student</button>
                    </div>
                </div>

                <div class="mb-8"><input type="text" id="roster-search" oninput="renderStudentTable()" placeholder="Search by name or ID..." class="w-full max-w-md bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500"></div>

                <div class="glass-panel rounded-3xl overflow-hidden border border-white/5">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                <th class="p-6">Student Information</th><th class="p-6">Grade</th><th class="p-6 text-center">Attendance</th><th class="p-6 text-center">Homework</th><th class="p-6 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-attendance" class="tab-content">
                <h1 class="text-4xl font-black text-white italic mb-8">LIVE <span class="text-emerald-500">ATTENDANCE</span></h1>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-4">
                        <input type="text" id="attendance-scan-input" placeholder="Ready to Scan Barcode..." class="w-full bg-black/40 border-2 border-blue-500/20 p-6 rounded-3xl text-2xl text-white outline-none focus:border-blue-500 font-mono mb-4">
                        <div id="attendance-list-container"></div>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl border border-white/5 h-fit">
                        <h3 class="text-white font-bold uppercase text-xs mb-4">Session Log (Recent First)</h3>
                        <textarea id="session-log" readonly class="w-full h-96 bg-black/40 border border-white/10 rounded-2xl p-4 font-mono text-xs text-emerald-400 outline-none resize-none"></textarea>
                    </div>
                </div>
            </section>

            <section id="tab-homework" class="tab-content">
                <h1 class="text-4xl font-black text-white italic mb-8">HOMEWORK <span class="text-blue-500">TRACKING</span></h1>
                <div id="hw-grade-container" class="space-y-8"></div>
            </section>

            <section id="tab-database" class="tab-content">
                <h1 class="text-4xl font-black text-white italic mb-8">CONTACT <span class="text-blue-500">DATABASE</span></h1>
                <div class="mb-8"><input type="text" id="db-search" oninput="renderDatabaseTable()" placeholder="Search contacts..." class="w-full max-w-md bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none"></div>
                <div class="glass-panel rounded-3xl overflow-x-auto border border-white/5">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                <th class="p-6">Name</th><th class="p-6">Grade</th><th class="p-6">Phone</th><th class="p-6">Father Email</th><th class="p-6">Mother Email</th><th class="p-6 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="database-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-settings" class="tab-content">
                <div class="max-w-4xl mx-auto space-y-8">
                    <div class="glass-panel p-8 rounded-3xl border border-white/5 text-center">
                        <h3 class="text-white font-bold mb-4 uppercase text-xs">Total Classes Held</h3>
                        <input type="number" id="global-classes-input" onchange="updateGlobalClasses(this.value)" class="w-32 bg-black/40 border border-white/10 p-6 rounded-3xl text-5xl font-black text-blue-500 outline-none text-center">
                    </div>
                    <div class="glass-panel p-8 rounded-3xl border border-white/5">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-white font-bold uppercase text-xs">Grade Levels</h3>
                            <button onclick="addNewGrade()" class="text-blue-500 font-bold text-xs hover:underline">+ ADD LEVEL</button>
                        </div>
                        <div id="grade-config-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="student-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden items-center justify-center z-[110] p-4">
        <div class="glass-panel p-8 rounded-3xl border border-white/10 w-full max-w-lg">
            <h2 id="modal-title" class="text-2xl font-black text-white mb-6 italic uppercase">ADD <span class="text-blue-500">STUDENT</span></h2>
            <div class="grid grid-cols-1 gap-4">
                <input type="text" id="m-id" placeholder="Student ID (Unique Barcode)" class="bg-black/40 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-blue-500">
                <input type="text" id="m-name" placeholder="Full Name" class="bg-black/40 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-blue-500">
                <input type="text" id="m-grade" placeholder="Grade ID (e.g., g1a)" class="bg-black/40 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-blue-500">
                <input type="text" id="m-phone" placeholder="Phone Number" class="bg-black/40 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-blue-500">
                <input type="email" id="m-f-email" placeholder="Father's Email" class="bg-black/40 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-blue-500">
                <input type="email" id="m-m-email" placeholder="Mother's Email" class="bg-black/40 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeStudentModal()" class="flex-1 bg-white/5 text-white py-3 rounded-xl font-bold">Cancel</button>
                <button onclick="saveStudent()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Save Student</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
