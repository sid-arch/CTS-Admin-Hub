<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS Admin Hub | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen">

    <div id="login-page" class="fixed inset-0 bg-[#000000] flex items-center justify-center z-[100] p-4">
        <div class="glass-panel p-10 rounded-3xl shadow-2xl w-full max-w-md border border-white/10 text-center">
            <h1 class="text-3xl font-extrabold text-white mb-8 italic tracking-tighter">CTS <span class="text-blue-500">ADMIN HUB</span></h1>
            <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl mb-6 text-center text-white text-xl outline-none">
            <button onclick="checkAuth()" class="levitate bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl w-full font-bold uppercase tracking-widest">Log In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex min-h-screen">
        <aside class="w-72 bg-[#020617] border-r border-white/5 flex flex-col sticky top-0 h-screen">
            <div class="p-8 text-white font-black text-2xl italic">CTS<span class="text-blue-500">.</span></div>
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="switchTab('attendance', this)" class="nav-link w-full text-left p-4 rounded-2xl flex items-center gap-4"><span>📅</span> Attendance</button>
                <button onclick="switchTab('homework', this)" class="nav-link w-full text-left p-4 rounded-2xl flex items-center gap-4"><span>📚</span> Homework</button>
                <button onclick="switchTab('students', this)" class="nav-link w-full text-left p-4 rounded-2xl flex items-center gap-4"><span>👥</span> Roster</button>
                <button onclick="switchTab('database', this)" class="nav-link w-full text-left p-4 rounded-2xl flex items-center gap-4 active-link"><span>📂</span> Database</button>
            </nav>
            <div class="p-6 border-t border-white/5 space-y-2">
                <button onclick="switchTab('settings', this)" class="w-full text-left p-4 text-slate-500 hover:text-white flex items-center gap-4 text-sm font-bold"><span>⚙️</span> Settings</button>
                <button onclick="location.reload()" class="w-full text-left p-4 text-red-400 text-sm font-bold"><span>🔒</span> Logout</button>
            </div>
        </aside>

        <main class="flex-1 p-10 bg-gradient-to-br from-[#020617] to-[#0f172a] overflow-y-auto">
            
            <section id="tab-attendance" class="tab-content">
                <div class="glass-panel p-8 rounded-3xl border border-white/5 mb-8">
                    <input type="text" id="manual-att-search" placeholder="Scan Student ID..." onkeydown="if(event.key==='Enter') markAttendance(this.value)" class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-white outline-none">
                </div>
                <div id="session-log" class="glass-panel p-6 rounded-3xl border border-white/5 min-h-[150px] font-mono text-xs">Activity Log...</div>
            </section>

            <section id="tab-homework" class="tab-content">
                <div id="hw-grade-container" class="space-y-6"></div>
            </section>

            <section id="tab-students" class="tab-content">
                <div class="glass-panel p-6 rounded-3xl border border-white/5 mb-8 text-center">
                    <input type="text" id="roster-search" oninput="renderStudentTable()" placeholder="Search Roster..." class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-white outline-none">
                </div>
                <div class="glass-panel rounded-3xl border border-white/5 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-[11px] uppercase tracking-widest font-black text-slate-500">
                            <tr><th class="p-6">Student</th><th class="p-6">Grade</th><th class="p-6 text-center">Att %</th><th class="p-6 text-center">HW %</th><th class="p-6 text-right">Action</th></tr>
                        </thead>
                        <tbody id="student-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-database" class="tab-content active-tab">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="glass-panel p-6 rounded-3xl border border-white/5">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Students</p>
                        <h2 class="text-4xl font-black text-white" id="stat-total-students">0</h2>
                    </div>
                    <div id="grade-stats-container" class="md:col-span-2 flex gap-4 overflow-x-auto pb-2"></div>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                    <input type="text" id="db-search" oninput="renderDatabaseTable()" placeholder="Search Database..." class="w-full md:w-96 bg-black/40 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <div class="flex gap-4">
                        <input type="file" id="csv-import" accept=".csv" class="hidden" onchange="handleCSVImport(event)">
                        <button onclick="document.getElementById('csv-import').click()" class="levitate bg-emerald-600 text-white px-8 py-4 rounded-2xl font-bold text-xs uppercase">Import CSV</button>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl border border-white/5 overflow-x-auto">
                    <table class="w-full text-left min-w-[1000px]">
                        <thead class="bg-white/5 text-[11px] uppercase font-black text-slate-500">
                            <tr><th class="p-6">Name/ID</th><th class="p-6">Grade</th><th class="p-6">Phone</th><th class="p-6">Father Email</th><th class="p-6">Mother Email</th><th class="p-6 text-right">Action</th></tr>
                        </thead>
                        <tbody id="database-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-settings" class="tab-content">
                <div class="max-w-4xl mx-auto space-y-8">
                    <div class="glass-panel p-8 rounded-3xl border border-white/5 text-center">
                        <h3 class="text-white font-bold mb-4 uppercase text-xs">Total Classes Held</h3>
                        <input type="number" id="global-classes-input" onchange="updateGlobalClasses(this.value)" class="w-32 bg-black/40 border border-white/10 p-6 rounded-3xl text-5xl font-black text-blue-500 outline-none text-center">
                    </div>
                    <div class="glass-panel p-8 rounded-3xl border border-white/5">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-white font-bold uppercase text-xs">Grade Levels</h3>
                            <button onclick="addNewGrade()" class="text-blue-500 font-bold text-xs hover:underline">+ ADD LEVEL</button>
                        </div>
                        <div id="grade-config-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
