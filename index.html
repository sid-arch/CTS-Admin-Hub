<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS Admin Hub | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen">

    <div id="login-page" class="fixed inset-0 bg-black flex items-center justify-center z-[200]">
        <div class="glass-panel p-12 rounded-[3rem] border border-white/10 text-center w-full max-w-md">
            <h1 class="text-4xl font-black text-white italic mb-10">CTS <span class="text-blue-500">HUB</span></h1>
            <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-white outline-none mb-6 text-center text-2xl">
            <button onclick="checkAuth()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest text-white shadow-xl shadow-blue-500/20">Unlock</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-80 bg-[#020617] border-r border-white/5 p-10 flex flex-col gap-10">
            <h2 class="text-4xl font-black text-white italic">CTS<span class="text-blue-500">.</span></h2>
            <nav class="flex flex-col gap-3 flex-1">
                <button onclick="switchTab('roster', this)" class="nav-link active-link p-5 rounded-2xl font-bold text-sm">Dashboard</button>
                <button onclick="switchTab('attendance', this)" class="nav-link p-5 rounded-2xl font-bold text-sm">Attendance</button>
                <button onclick="switchTab('homework', this)" class="nav-link p-5 rounded-2xl font-bold text-sm">Homework</button>
                <button onclick="switchTab('database', this)" class="nav-link p-5 rounded-2xl font-bold text-sm">Database</button>
                <button onclick="switchTab('settings', this)" class="nav-link p-5 rounded-2xl font-bold text-sm">Settings</button>
            </nav>
        </aside>

        <main class="flex-1 p-16">
            <section id="tab-roster" class="tab-content active-tab">
                <div class="flex justify-between items-end mb-16">
                    <h1 class="text-7xl font-black text-white italic uppercase tracking-tighter">Roster</h1>
                    <button onclick="openStudentModal()" class="bg-blue-600 text-white px-12 py-6 rounded-[2rem] font-black uppercase text-xs">Add Student</button>
                </div>
                <div class="glass-panel rounded-[3rem] overflow-hidden border border-white/5">
                    <table class="w-full text-left">
                        <thead><tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest"><th class="p-10">Student</th><th class="p-10">Grade</th><th class="p-10 text-center">Attendance</th><th class="p-10 text-center">HW</th><th class="p-10"></th></tr></thead>
                        <tbody id="student-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-settings" class="tab-content">
                <div class="max-w-4xl mx-auto space-y-12">
                    <div class="glass-panel p-16 rounded-[4rem] text-center">
                        <h3 class="text-slate-500 font-bold uppercase text-xs mb-8">Total Sessions Held</h3>
                        <input type="number" id="global-classes-input" onchange="updateGlobalClasses(this.value)" class="w-48 bg-black/40 border-2 border-white/5 p-10 rounded-[3rem] text-8xl font-black text-blue-500 text-center outline-none">
                    </div>

                    <div id="grade-config-list" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                    
                    <button onclick="addNewGrade()" class="w-full bg-white/5 p-8 rounded-[2rem] border-2 border-dashed border-white/5 font-black text-xs uppercase text-slate-500 hover:bg-white/10 transition-all">+ Register New Grade</button>

                    <div class="glass-panel p-12 rounded-[3rem] border border-white/5 flex gap-6">
                        <button onclick="downloadFullBackup()" class="flex-1 bg-emerald-600/10 text-emerald-400 p-6 rounded-2xl font-black text-xs uppercase tracking-widest border border-emerald-500/20 hover:bg-emerald-600 hover:text-white transition-all">Download Backup</button>
                        <button onclick="dangerZoneReset()" class="flex-1 bg-rose-600/10 text-rose-500 p-6 rounded-2xl font-black text-xs uppercase tracking-widest border border-rose-500/20 hover:bg-rose-600 hover:text-white transition-all">Master Reset</button>
                    </div>
                </div>
            </section>

            <section id="tab-database" class="tab-content">
                <h1 class="text-5xl font-black text-white italic mb-16 uppercase tracking-tighter">Directory</h1>
                <div class="glass-panel rounded-[3rem] overflow-hidden border border-white/5">
                    <table class="w-full text-left">
                        <thead><tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest"><th class="p-10">Name</th><th class="p-10">Grade</th><th class="p-10">Phone</th><th class="p-10 text-right">Records</th></tr></thead>
                        <tbody id="database-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-attendance" class="tab-content">
                <h1 class="text-5xl font-black text-white italic mb-16 uppercase">Terminal</h1>
                <div class="grid grid-cols-3 gap-10">
                    <div class="col-span-2">
                        <input type="text" id="attendance-scan-input" placeholder="Scan Barcode" class="w-full bg-black/40 p-16 rounded-[4rem] text-5xl text-white outline-none font-mono text-center border-2 border-blue-500/10 focus:border-blue-500/30">
                    </div>
                    <div class="glass-panel p-10 rounded-[3rem] border border-white/5 h-[600px]">
                        <textarea id="session-log" readonly class="w-full h-full bg-transparent text-emerald-400 font-mono text-xs outline-none resize-none"></textarea>
                    </div>
                </div>
            </section>

            <section id="tab-homework" class="tab-content">
                <h1 class="text-5xl font-black text-white italic mb-16 uppercase">Homework</h1>
                <div id="hw-grade-container" class="space-y-10"></div>
            </section>
        </main>
    </div>

    <div id="student-modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[300] p-4">
        <div class="glass-panel p-16 rounded-[4rem] border border-white/10 w-full max-w-2xl">
            <h2 class="text-4xl font-black text-white mb-12 italic uppercase">Student Profile</h2>
            <div class="grid gap-6">
                <input type="text" id="m-id" placeholder="Barcode ID" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500">
                <input type="text" id="m-name" placeholder="Full Name" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500">
                <input type="text" id="m-grade" placeholder="Grade ID (e.g. g1a)" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500">
                <input type="text" id="m-phone" placeholder="Phone" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500">
                <input type="email" id="m-f-email" placeholder="Father Email" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500">
                <input type="email" id="m-m-email" placeholder="Mother Email" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-6 mt-12">
                <button onclick="document.getElementById('student-modal').classList.replace('flex','hidden')" class="flex-1 bg-white/5 text-slate-500 py-6 rounded-3xl font-black uppercase text-xs">Cancel</button>
                <button onclick="saveStudent()" class="flex-1 bg-blue-600 text-white py-6 rounded-3xl font-black uppercase text-xs">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
