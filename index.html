<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS Admin Hub | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen font-['Outfit']">

    <div id="login-page" class="fixed inset-0 bg-black flex items-center justify-center z-[100] p-4">
        <div class="glass-panel p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-white/10 text-center">
            <h1 class="text-3xl font-black text-white mb-8 italic tracking-tighter">CTS <span class="text-blue-500">ADMIN HUB</span></h1>
            <input type="password" id="admin-pass" placeholder="Enter Admin Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all mb-4 text-center text-xl">
            <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-500/20 active:scale-95">ACCESS HUB</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-72 bg-[#020617] border-r border-white/5 p-8 flex flex-col gap-8 sticky top-0 h-screen">
            <div class="px-4"><h2 class="text-2xl font-black text-white italic">CTS<span class="text-blue-500">.</span></h2></div>
            <nav class="flex flex-col gap-2 flex-1">
                <button onclick="switchTab('roster', this)" class="nav-link active-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>🏠</span> Dashboard</button>
                <button onclick="switchTab('attendance', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📅</span> Attendance</button>
                <button onclick="switchTab('homework', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📚</span> Homework</button>
                <button onclick="switchTab('database', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>📂</span> Database</button>
                <button onclick="switchTab('settings', this)" class="nav-link p-4 rounded-2xl flex items-center gap-4 font-bold text-sm"><span>⚙️</span> Settings</button>
            </nav>
            <button onclick="location.reload()" class="p-4 text-rose-500 font-bold text-xs uppercase tracking-widest hover:bg-rose-500/10 rounded-2xl transition-all">Logout</button>
        </aside>

        <main class="flex-1 p-6 md:p-12 overflow-y-auto bg-gradient-to-br from-[#020617] to-[#0f172a]">
            
            <section id="tab-roster" class="tab-content active-tab">
                <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
                    <div>
                        <h1 class="text-5xl font-black text-white italic mb-2 tracking-tighter">STUDENT <span class="text-blue-500">ROSTER</span></h1>
                        <p class="text-slate-500 font-medium uppercase text-[10px] tracking-[0.2em]">Live Database Status: <span id="stat-total-students" class="text-blue-400">0</span> Students</p>
                    </div>
                    <div class="flex gap-3">
                        <label class="bg-white/5 text-white px-6 py-4 rounded-2xl font-bold text-xs uppercase cursor-pointer border border-white/5 hover:bg-white/10 transition-all">
                            Import CSV <input type="file" class="hidden" onchange="handleCSVImport(event)" accept=".csv">
                        </label>
                        <button onclick="openStudentModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold text-xs uppercase shadow-lg shadow-blue-600/20 hover:scale-105 transition-all">Add Student</button>
                    </div>
                </div>
                <div class="mb-8"><input type="text" id="roster-search" oninput="renderStudentTable()" placeholder="Filter by name or ID..." class="w-full max-w-md bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all"></div>
                <div class="glass-panel rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">
                                <th class="p-6">Student</th><th class="p-6">Grade</th><th class="p-6 text-center">Attendance</th><th class="p-6 text-center">HW Score</th><th class="p-6 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-attendance" class="tab-content">
                <h1 class="text-4xl font-black text-white italic mb-8">LIVE <span class="text-emerald-500">SCANS</span></h1>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-4">
                        <input type="text" id="attendance-scan-input" placeholder="Ready for barcode scan..." class="w-full bg-black/40 border-2 border-emerald-500/20 p-6 rounded-[2rem] text-2xl text-white outline-none focus:border-emerald-500 font-mono transition-all shadow-inner">
                        <div id="attendance-list-container" class="space-y-2"></div>
                    </div>
                    <div class="glass-panel p-6 rounded-[2rem] border border-white/5 h-[600px] flex flex-col">
                        <h3 class="text-white font-bold uppercase text-[10px] tracking-widest mb-4 text-slate-500">Activity Log</h3>
                        <textarea id="session-log" readonly class="flex-1 bg-black/20 border border-white/5 rounded-2xl p-4 font-mono text-[11px] text-emerald-400 outline-none resize-none scroll-custom"></textarea>
                    </div>
                </div>
            </section>

            <section id="tab-homework" class="tab-content">
                <h1 class="text-4xl font-black text-white italic mb-8">HOMEWORK <span class="text-blue-500">PORTAL</span></h1>
                <div id="hw-grade-container" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
            </section>

            <section id="tab-database" class="tab-content">
                <h1 class="text-4xl font-black text-white italic mb-8">CONTACT <span class="text-blue-500">INDEX</span></h1>
                <div class="mb-8"><input type="text" id="db-search" oninput="renderDatabaseTable()" placeholder="Search parents/phone..." class="w-full max-w-md bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500"></div>
                <div class="glass-panel rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-white/5 text-[10px] font-black uppercase text-slate-500 tracking-widest"><th class="p-6">Name</th><th class="p-6">Grade</th><th class="p-6">Phone</th><th class="p-6">Parents</th><th class="p-6 text-right">Action</th></tr>
                        </thead>
                        <tbody id="database-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-settings" class="tab-content">
                <div class="max-w-4xl mx-auto space-y-8">
                    <div class="glass-panel p-10 rounded-[2.5rem] border border-white/5 text-center shadow-2xl bg-gradient-to-b from-white/5 to-transparent">
                        <h3 class="text-slate-500 font-bold mb-4 uppercase text-[10px] tracking-[0.3em]">Total Sessions Logged</h3>
                        <input type="number" id="global-classes-input" onchange="updateGlobalClasses(this.value)" class="w-40 bg-black/40 border border-white/10 p-8 rounded-[2rem] text-6xl font-black text-blue-500 outline-none text-center focus:border-blue-500 transition-all">
                    </div>
                    <div class="glass-panel p-10 rounded-[2.5rem] border border-white/5">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-white font-black uppercase text-sm italic">Grade Levels</h3>
                            <button onclick="addNewGrade()" class="bg-blue-600/10 text-blue-500 px-6 py-2 rounded-full font-bold text-[10px] hover:bg-blue-600 hover:text-white transition-all">+ ADD NEW LEVEL</button>
                        </div>
                        <div id="grade-config-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="student-modal" class="fixed inset-0 bg-[#020617]/95 backdrop-blur-md hidden items-center justify-center z-[110] p-4">
        <div class="glass-panel p-10 rounded-[2.5rem] border border-white/10 w-full max-w-lg shadow-2xl">
            <h2 id="modal-title" class="text-3xl font-black text-white mb-8 italic uppercase tracking-tighter">ADD <span class="text-blue-500">STUDENT</span></h2>
            <div class="grid grid-cols-1 gap-4">
                <div class="space-y-1"><label class="text-[9px] font-black text-slate-500 uppercase ml-2">ID / Barcode</label><input type="text" id="m-id" class="modal-input w-full"></div>
                <div class="space-y-1"><label class="text-[9px] font-black text-slate-500 uppercase ml-2">Full Name</label><input type="text" id="m-name" class="modal-input w-full"></div>
                <div class="space-y-1"><label class="text-[9px] font-black text-slate-500 uppercase ml-2">Grade Code (e.g. g1)</label><input type="text" id="m-grade" class="modal-input w-full"></div>
                <div class="space-y-1"><label class="text-[9px] font-black text-slate-500 uppercase ml-2">Primary Phone</label><input type="text" id="m-phone" class="modal-input w-full"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[9px] font-black text-slate-500 uppercase ml-2">Father Email</label><input type="email" id="m-f-email" class="modal-input w-full"></div>
                    <div class="space-y-1"><label class="text-[9px] font-black text-slate-500 uppercase ml-2">Mother Email</label><input type="email" id="m-m-email" class="modal-input w-full"></div>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeStudentModal()" class="flex-1 bg-white/5 text-slate-400 py-4 rounded-2xl font-bold hover:bg-white/10 transition-all uppercase text-xs">Cancel</button>
                <button onclick="saveStudent()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-500 transition-all uppercase text-xs shadow-lg shadow-blue-600/20">Save Profile</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
